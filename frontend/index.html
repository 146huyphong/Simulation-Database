<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree: Quản lý Sinh viên</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="main.js"></script>
    <style>
        .tree-controls { margin-bottom: 15px; }
        .tree-controls button { margin-right: 10px; padding: 5px 10px; cursor: pointer; }
        .active-btn { background-color: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Hệ Thống Quản Lý Sinh Viên</h1>
        <p>Mô phỏng Chỉ mục B-Tree (Cây ID & Cây Họ Tên)</p>
    </div>

    <div class="container">
        <div class="left-panel">
            <div class="card">
                <h3>Thêm Sinh Viên</h3>
                <input type="text" id="add-id" placeholder="MSSV">
                <input type="text" id="add-name" placeholder="Họ tên">
                <input type="text" id="add-gender" placeholder="Giới tính">
                <button onclick="addStudent()">Thêm Mới</button>
            </div>

            <div class="card">
                <h3>Xóa / Tìm Kiếm</h3>
                <select id="search-type" style="padding: 5px; margin-bottom: 5px; width: 100%;">
                    <option value="id">Tìm theo Mã SV</option>
                    <option value="name">Tìm theo Họ Tên</option>
                </select>
                <input type="text" id="action-id" placeholder="Nhập từ khóa...">
                <button class="btn-search" onclick="searchStudent()">Tìm Kiếm</button>
                <button class="btn-danger" onclick="deleteStudent()">Xóa (Theo Mã SV)</button>
                <div id="search-result" style="margin-top: 10px;"></div>
            </div>

            <div class="card">
                <h3>Bảng Dữ Liệu Gốc (Lưu trên Đĩa)</h3>
                <table id="student-table" width="100%" border="1" style="border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr>
                            <th>Offset</th>
                            <th>Mã SV</th>
                            <th>Họ Tên</th>
                            <th>Giới Tính</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="right-panel">
            <div class="card tree-card">
                <h3 id="tree-title">Cấu trúc Cây B-Tree (Đang xem: ID)</h3>
                <div class="tree-controls">
                    <button id="btn-tree-id" class="active-btn" onclick="renderTree('id')">Xem Cây ID</button>
                    <button id="btn-tree-name" onclick="renderTree('name')">Xem Cây Họ Tên</button>
                </div>
                <svg id="btree-svg" width="100%" height="500"></svg>
            </div>
        </div>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
