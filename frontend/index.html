<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree: Quản lý Sinh viên</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>Hệ Thống Quản Lý Sinh Viên</h1>
        <p>Mô phỏng Chỉ mục B-Tree</p>
    </div>

    <div class="container">
        <div class="left-panel">
            <div class="card">
                <h3>Thêm Sinh Viên</h3>
                <input type="text" id="add-id" placeholder="MSSV">
                <input type="text" id="add-name" placeholder="Họ tên">
                <input type="text" id="add-gender" placeholder="Giới tính">
                <button onclick="addStudent()">Thêm Mới</button>
            </div>

            <div class="card">
                <h3>Xóa / Tìm Kiếm</h3>
                <input type="text" id="action-id" placeholder="Nhập Mã SV hoặc Họ tên">
                <button class="btn-search" onclick="searchStudent()">Tìm Kiếm</button>
                <button class="btn-danger" onclick="deleteStudent()">Xóa (Theo Mã SV)</button>
                <p id="search-result" style="color: blue; margin-top: 10px;"></p>
            </div>

            <div class="card">
                <h3>Bảng Dữ Liệu Gốc (Bảng Sinh Viên)</h3>
                <table id="student-table">
                    <thead>
                        <tr>
                            <th>Offset</th>
                            <th>Mã SV</th>
                            <th>Họ Tên</th>
                            <th>Giới Tính</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>

        <div class="right-panel">
            <div class="card tree-card">
                <h3>Cấu trúc Cây B-Tree (Index theo Mã SV)</h3>
                <button onclick="renderTree()" style="margin-bottom: 10px;">Làm mới cây</button>
                <svg id="btree-svg" width="100%" height="500"></svg>
            </div>
        </div>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
